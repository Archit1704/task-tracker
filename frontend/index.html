<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Task Tracker Dashboard</title>

<style>

body{
    font-family: Arial, sans-serif;
    background:#f5f7fa;
    margin:0;
    padding:0;
}

.container{
    width:900px;
    margin:auto;
    padding:20px;
}

h1{
    text-align:center;
}

.card{
    background:white;
    padding:20px;
    margin-top:20px;
    border-radius:8px;
    box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

input{
    padding:10px;
    margin:5px;
    width:250px;
}

button{
    padding:10px 15px;
    border:none;
    background:#007bff;
    color:white;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    background:#0056b3;
}

ul{
    list-style:none;
    padding:0;
}

li{
    padding:10px;
    border-bottom:1px solid #eee;
    display:flex;
    justify-content:space-between;
}

select{
    padding:5px;
}

</style>

</head>

<body>

<div class="container">

<h1>Task Tracker Dashboard</h1>

<div class="card">

<h2>Add Task</h2>

<input id="title" placeholder="Task Title">
<input id="description" placeholder="Task Description">

<button onclick="addTask()">Add Task</button>

</div>

<div class="card">

<h2>Tasks</h2>

<ul id="taskList"></ul>

</div>

<div class="card">

<h2>Task Status Chart</h2>

<canvas id="chart"></canvas>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="script.js"></script>

</body>
</html>
